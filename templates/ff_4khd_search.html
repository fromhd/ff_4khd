{% extends "base.html" %}
{% block content %}
<style>
    /* 목록 그리드 개선: 가로 5개, 세로 3개 */
    .col-custom { padding: 8px; flex: 0 0 20%; max-width: 20%; }
    @media (max-width: 1200px) { .col-custom { flex: 0 0 25%; max-width: 25%; } }
    @media (max-width: 992px) { .col-custom { flex: 0 0 33.333%; max-width: 33.333%; } }
    @media (max-width: 768px) { .col-custom { flex: 0 0 50%; max-width: 50%; } }
    
    .post-card { transition: transform 0.2s; cursor: pointer; height: 100%; border: none; background: #fff; }
    .post-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
    .card-img-top { height: 280px; object-fit: cover; background-color: #002b36; border-radius: 8px; }
    .card-body { padding: 10px 5px !important; }
    .card-text { font-size: 0.95rem; line-height: 1.2; height: 2.4rem; overflow: hidden; }
    
    #detail_modal .modal-dialog { max-width: 900px; }
    #detail_modal .modal-content { border-radius: 15px; overflow: hidden; background-color: #f8f9fa; display: flex; flex-direction: column; height: 90vh; }
    #detail_modal .modal-body { flex: 1; overflow-y: auto; padding: 0; }
    
    .floating-close {
        position: absolute; right: 20px; top: 15px; z-index: 1060;
        background: rgba(0,0,0,0.5); color: white; border: none;
        border-radius: 50%; width: 40px; height: 40px; font-size: 20px;
        line-height: 40px; text-align: center; cursor: pointer;
    }
    .floating-close:hover { background: rgba(255,0,0,0.7); }
    
    .gallery-img { cursor: zoom-in; width: 100%; border-bottom: 1px solid #ddd; }
    #video_player_container:empty, #download_links:empty { display: none; }
    
    .modal-footer-fixed {
        padding: 15px; background: #fff; border-top: 1px solid #ddd;
        text-align: right; z-index: 1050;
    }
</style>

<div class="container-fluid">
    <div class="row p-3 bg-light border-bottom mb-3">
        <div class="col-md-8 offset-md-2 d-flex">
            <input id="search_word" class="form-control mr-2" type="text" placeholder="검색어 입력 (예: ARTGRAVIA)">
            <button id="search_btn" class="btn btn-primary px-4">검색</button>
        </div>
    </div>
    
    <div id="list_div" class="row p-3"></div>
    
    <div id="pagination" class="d-flex justify-content-center p-4" style="display:none !important;">
        <button class="btn btn-outline-primary mr-2" onclick="searchPosts(currentPage > 1 ? currentPage - 1 : 1)">이전</button>
        <span id="page_info" class="align-self-center mx-3 font-weight-bold">Page 1</span>
        <button class="btn btn-outline-primary" onclick="searchPosts(currentPage + 1)">다음</button>
    </div>
</div>

<!-- 상세 보기 모달 -->
<div class="modal fade" id="detail_modal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <button type="button" class="floating-close" data-dismiss="modal">&times;</button>
            <div class="modal-header bg-dark text-white py-2">
                <h5 class="modal-title w-100 text-center pr-4" id="modal_title">상세 정보</h5>
            </div>
            <div class="modal-body">
                <div id="video_player_container" class="p-2"></div>
                <div id="image_gallery" class="row no-gutters"></div>
                <div id="download_links" class="p-3 text-center border-top"></div>
            </div>
            <div id="download_btn_container" class="modal-footer-fixed">
                <button class="btn btn-success btn-block shadow-sm" id="btn_download_all">
                    <i class="fa fa-download"></i> 이 화보 전체 다운로드 (JPG+ZIP)
                </button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
const package_name = "{{ arg['package_name'] }}";
let currentPage = 1;
let currentDetailUrl = "";

$(document).ready(function(){
    $("#search_btn").click(function(){
        searchPosts(1);
    });
    $("#search_word").keyup(function(e){
        if(e.keyCode == 13) searchPosts(1);
    });
    
    $(document).on('click', '.gallery-img', function(){
        window.open($(this).attr('src'), '_blank');
    });

    $("#btn_download_all").click(function(){
        if (!currentDetailUrl) return;
        downloadPost(currentDetailUrl, false);
    });
});

function downloadPost(url, force) {
    const btn = $("#btn_download_all");
    btn.prop('disabled', true);

    $.ajax({
        url: '/' + package_name + '/ajax/download',
        type: 'POST',
        data: { url: url, force: force },
        success: function(data) {
            if (data.ret == 'exists') {
                if (confirm(data.msg)) {
                    downloadPost(url, true); // 강제 다운로드 재시도
                } else {
                    btn.prop('disabled', false);
                }
            } else if (data.ret == 'success') {
                $.notify({ message: data.msg }, { type: 'success' });
                startStatusPolling(url, btn);
            } else {
                $.notify({ message: data.log }, { type: 'danger' });
                btn.prop('disabled', false);
            }
        }
    });
}

function startStatusPolling(url, btn) {
    const interval = setInterval(function() {
        $.ajax({
            url: '/' + package_name + '/ajax/download_status',
            type: 'POST',
            data: { url: url },
            success: function(status) {
                if (status.status === 'downloading') {
                    let percent = 0;
                    if (status.total > 0) percent = Math.floor((status.current / status.total) * 100);
                    btn.html(`<i class="fa fa-spinner fa-spin"></i> 다운로드 중... (${status.current}/${status.total}, ${percent}%)`);
                } else if (status.status === 'zipping') {
                    btn.html('<i class="fa fa-archive fa-spin"></i> 압축 중... (ZIP)');
                } else if (status.status === 'completed') {
                    btn.html('<i class="fa fa-check"></i> 다운로드 완료!');
                    btn.removeClass('btn-success').addClass('btn-primary');
                    clearInterval(interval);
                    setTimeout(() => {
                        btn.prop('disabled', false).html('<i class="fa fa-download"></i> 이 화보 전체 다운로드 (JPG+ZIP)');
                        btn.removeClass('btn-primary').addClass('btn-success');
                    }, 3000);
                } else if (status.status === 'error') {
                    btn.html('<i class="fa fa-exclamation-triangle"></i> 오류 발생');
                    btn.removeClass('btn-success').addClass('btn-danger');
                    clearInterval(interval);
                    setTimeout(() => {
                        btn.prop('disabled', false).html('<i class="fa fa-download"></i> 이 화보 전체 다운로드 (JPG+ZIP)');
                        btn.removeClass('btn-danger').addClass('btn-success');
                    }, 3000);
                }
            }
        });
    }, 1000);
}

function searchPosts(page) {
    let word = $("#search_word").val();
    if (!word) return;
    
    currentPage = page;
    $("#page_info").text("Page " + page);
    $("#list_div").html('<div class="col-12 text-center p-5"><h4>검색 중...</h4></div>');
    $("#pagination").attr('style', 'display:none !important;');
    window.scrollTo(0, 0);

    $.ajax({
        url: '/' + package_name + '/ajax/list',
        type: 'POST',
        data: { page: page, search: word },
        success: function(data) {
            if (data.ret == 'success' && data.data.length > 0) {
                renderList(data.data);
                $("#pagination").attr('style', 'display:flex !important;');
            } else {
                $("#list_div").html('<div class="col-12 text-center p-5"><h4>검색 결과가 없습니다.</h4></div>');
            }
        }
    });
}

function renderList(data) {
    let html = '';
    data.forEach(item => {
        html += `
            <div class="col-custom mb-3">
                <div class="card post-card shadow-sm" onclick="showDetail('${item.url}')">
                    <img src="${item.thumbnail}" class="card-img-top" alt="thumbnail">
                    <div class="card-body">
                        <p class="card-text font-weight-bold mb-0" title="${item.title}">${item.title}</p>
                    </div>
                </div>
            </div>
        `;
    });
    $("#list_div").html(html);
}

function showDetail(url) {
    currentDetailUrl = url;
    $("#modal_title").text("로딩 중...");
    $("#image_gallery").html('<div class="col-12 text-center p-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">콘텐츠를 불러오는 중입니다...</p></div>');
    $("#video_player_container").hide().empty();
    $("#download_links").hide().empty();
    $("#download_btn_container").hide();
    $("#detail_modal").modal('show');

    $.ajax({
        url: '/' + package_name + '/ajax/detail',
        type: 'POST',
        data: { url: url },
        success: function(data) {
            if (data.ret == 'success') {
                let detail = data.data;
                $("#modal_title").text(detail.title);
                $("#image_gallery").empty();
                $("#download_btn_container").show();
                
                if (detail.videos.length > 0) {
                    $("#video_player_container").show();
                    detail.videos.forEach(v => {
                        $("#video_player_container").append(`
                            <div class="embed-responsive embed-responsive-16by9 mb-3">
                                <iframe class="embed-responsive-item" src="${v}" allowfullscreen></iframe>
                            </div>
                        `);
                    });
                }
                
                let displayImages = detail.proxy_images || detail.images;
                if (displayImages.length > 0) {
                    displayImages.forEach(img => {
                        $("#image_gallery").append(`
                            <div class="col-12 text-center">
                                <img src="${img}" class="gallery-img mb-1" loading="lazy">
                            </div>
                        `);
                    });
                } else {
                    $("#image_gallery").html('<div class="col-12 text-center p-3">이미지를 찾을 수 없습니다.</div>');
                }

                if (detail.downloads.length > 0) {
                    $("#download_links").show();
                    let dhtml = '<div class="font-weight-bold mb-2">외부 다운로드 링크:</div>';
                    detail.downloads.forEach(d => {
                        dhtml += `<a href="${d.link}" target="_blank" class="btn btn-sm btn-info mr-2 mt-2">${d.name}</a>`;
                    });
                    $("#download_links").html(dhtml);
                }
            } else {
                $("#modal_title").text("에러 발생");
                $("#image_gallery").html(`<div class="col-12 text-center text-danger p-5"><h4>${data.log}</h4></div>`);
            }
        },
        error: function() {
            $("#modal_title").text("통신 에러");
            $("#image_gallery").html('<div class="col-12 text-center text-danger p-5"><h4>서버와 통신 중 에러가 발생했습니다.</h4></div>');
        }
    });
}
</script>
{% endblock %}
